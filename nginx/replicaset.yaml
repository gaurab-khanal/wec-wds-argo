apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx-multi-replicaset
  namespace: default
  labels:
    app.kubernetes.io/name: nginx-multi
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx-multi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx-multi
    spec:
      containers:
      - name: nginx
        image: nginx:1.26
        ports:
        - containerPort: 80
